name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # engines.node は範囲指定 (>=22.5.0) のため node-version-file で読むと
          # 未検証の Current 系(奇数メジャー)に解決される恐れがある。
          # publish ゲートは FR-04 の検証済みマトリクス上限に合わせ、常に最新 LTS を使う。
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Extract changelog notes
        # CHANGELOG.md の当該バージョン節を抽出し、gh release create の --notes-file へ渡す。
        # extract-changelog-notes.mjs が非0で終了した場合、既定シェル（bash -eo pipefail）に
        # よりこのステップが失敗し、以降の npm publish / Release 作成には進まない（fail fast）。
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-changelog-notes.mjs "$VERSION" > "$RUNNER_TEMP/release-notes.md"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        # 既存 runner 同梱の gh を使用（新規サードパーティ Action は追加しない）。
        # --verify-tag でタグの実在を検証してから Release を作成する。
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md" --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
